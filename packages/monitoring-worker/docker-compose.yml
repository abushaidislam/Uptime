services:
  monitoring-worker:
    build:
      context: ../..
      dockerfile: packages/monitoring-worker/Dockerfile
    container_name: statusvault-worker
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    restart: unless-stopped
    # Optional: Add health check
    # healthcheck:
    #   test: ["CMD", "node", "-e", "console.log('healthy')"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
